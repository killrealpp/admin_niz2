# Машинная карта для кода.
# Здесь хранятся ID из YCLIENTS. Этот файл читает Python.
#
# Как заполнять:
# 1. Откройте YCLIENTS и найдите ID услуги и ID сотрудника/ресурса.
# 2. Впишите их в yclients_service_id и yclients_staff_id.
# 3. Человеческие описания, фото и рекомендации храните в app/knowledge/objects.md.
#
# yclients_service_id — ID услуги из YCLIENTS.
# yclients_staff_id — ID сотрудника/ресурса/объекта из YCLIENTS.
# default_duration_minutes — длительность по умолчанию, если клиент не указал.

